<!DOCTYPE html>
<html>
<head>
    <title>Simple SQLite Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h1, h2 {
            color: #333;
            text-align: center;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #f9f9f9;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
        }
        body {
            font-family: "Inter", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1f5cbb 0%, #0f275c 45%, #08132a 100%);
            color: #e6ecff;
        }
        .container {
            background: linear-gradient(145deg, rgba(25, 39, 75, 0.95), rgba(11, 20, 54, 0.95));
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 650px;
            border: 1px solid rgba(176, 212, 255, 0.32);
        }
        h1, h2 {
            color: #e8f0ff;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,.25);
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 18px;
        }
        li {
            background: linear-gradient(130deg, rgba(108, 129, 191, 0.2), rgba(45, 68, 122, 0.35));
            margin: 8px 0;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(109, 146, 221, 0.35);
            line-height: 1.4;
        }
        .user-label {
            color: #c5d5ff;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 12px;
            border: 1px solid rgba(171, 192, 244, 0.6);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,.12);
            color: #fff;
            backdrop-filter: blur(5px);
            outline: none;
        }
        input:focus {
            border-color: #8ab3ff;
            box-shadow: 0 0 10px rgba(138, 179, 255, .25);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        .btn {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
        }
        .btn-add {
            background: linear-gradient(135deg, #32d575, #15a766);
        }
        .btn-auto {
            background: linear-gradient(135deg, #7f6aff, #3d50ff);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(43, 54, 110, 0.35);
            opacity: 0.95;
        }
        .stats-panel {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, minmax(100px, 1fr));
            gap: 12px;
        }
        .stats-panel .stat-card {
            background: linear-gradient(135deg, #5b86e5, #36d1dc);
            color: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            box-shadow: 0 5px 14px rgba(0,0,0,.25);
            min-height: 70px;
        }
        .dummy-sidebar {
            margin-top: 32px;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.12);
            background: rgba(10, 18, 44, 0.5);
            border-radius: 11px;
        }
        .dummy-sidebar h3 {
            margin: 0 0 12px;
            font-size: 18px;
            color: #d5e3ff;
            text-align: center;
        }
        .stats-panel {
            margin-top: 20px;
            display: grid;
            gap: 10px;
        }
        .stats-panel .stat-card {
            background: linear-gradient(135deg, #5b86e5, #36d1dc);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,.1);
        }
        .dummy-sidebar {
            margin-top: 30px;
            padding: 15px;
            border-top: 1px solid #e4e4e4;
            background: #fafafa;
            border-radius: 8px;
        }
        .dummy-sidebar h3 {
            margin: 0 0 12px;
            font-size: 18px;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Users</h1>
        <ul>
            {% for user in users %}
                <li>
                    <strong>Name:</strong> {{ user.name }}<br>
                    <strong>Email:</strong> {{ user.email }}
                </li>
            {% endfor %}
        </ul>

        <h2>Add User</h2>
        <form method="POST" action="/add" autocomplete="on" id="add-user-form">
            <input type="text" name="name" id="name" placeholder="Name" autocomplete="name" required>
            <input type="email" name="email" id="email" placeholder="Email" autocomplete="email" required>
            <div class="form-actions">
                <button type="button" class="btn btn-auto" id="autofill-btn">Autofill</button>
                <button type="submit" class="btn btn-add">Add</button>
            </div>
        </form>

        <div class="dummy-sidebar">
            <h3>Random Dummy Data</h3>
            <div class="stats-panel" id="dummy-stats"></div>
        </div>
    </div>

    <script>
        const dummyNames = [
            'Ava Stewart', 'Mason Clarke', 'Isla Brown', 'Kai Harper', 'Chloe Reed',
            'Leo Bennett', 'Mia Parker', 'Noah Fisher', 'Zara Hayes', 'Owen Grant'
        ];

        const dummyDomains = ['example.com', 'mail.com', 'demo.org', 'test.net'];

        function randomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function renderDummyStats() {
            const container = document.getElementById('dummy-stats');
            container.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                const name = randomItem(dummyNames);
                const email = `${name.split(' ')[0].toLowerCase()}.${name.split(' ')[1].toLowerCase()}@${randomItem(dummyDomains)}`;
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `<strong>${name}</strong><br>${email}`;
                container.appendChild(card);
            }
        }

        function fillAutofillForm() {
            const targetName = document.getElementById('name');
            const targetEmail = document.getElementById('email');
            const name = randomItem(dummyNames);
            const email = `${name.split(' ')[0].toLowerCase()}.${name.split(' ')[1].toLowerCase()}@${randomItem(dummyDomains)}`;
            targetName.value = name;
            targetEmail.value = email;
        }

        document.getElementById('autofill-btn').addEventListener('click', fillAutofillForm);

        renderDummyStats();
    </script>
</body>
</html>
