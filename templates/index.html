<!DOCTYPE html>
<html>
<head>
    <title>Simple SQLite Website</title>
</head>
<body>
    <h1>Users</h1>
    <ul>
        {% for user in users %}
            <li>{{ user[1] }} - {{ user[2] }}</li>
        {% endfor %}
    </ul>

    <h2>Add User</h2>
    <form method="POST" action="/add">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <button type="submit">Add</button>
    </form>
</body>
</html>
